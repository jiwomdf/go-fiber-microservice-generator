_format_version: "3.0"
_transform: true

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
      exposed_headers:
        - X-Kong-Request-Id
      credentials: true
      max_age: 3600
      preflight_continue: false
  - name: rate-limiting
    config:
      minute: 60
      hour: 1000
      policy: local
      hide_client_headers: false

consumers:
  - username: auth-client
    jwt_secrets:
      - key: auth-service
        algorithm: HS256
        secret: b7f9c2e4a1d84f6b9c3e7a2d5f1b8c6e9a0d3f7c2b5e8a1d4c6f9b2e7a3d5c1

services:
  - name: auth-login-service
    url: http://auth-service:7704/api/auth-service/v1/login
    routes:
      - name: auth-login-route
        paths:
          - /api/v1/login
        methods:
          - POST
          - OPTIONS
        strip_path: true

  - name: auth-service
    url: http://auth-service:7704/api/auth-service/v1/auth
    routes:
      - name: auth-route
        paths:
          - /api/v1/auth
        methods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
        strip_path: true

  - name: user-service
    url: http://user-service:7705/api/user-service/v1/user
    routes:
      - name: user-route
        paths:
          - /api/v1/user
        methods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
        strip_path: true
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          secret_is_base64: false
          claims_to_verify:
            - exp
