services:
  postgres:
    image: postgres:16-alpine
    container_name: micro-postgres
    environment:
      POSTGRES_DB: fiber_microservice
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fiber_microservice"]
      interval: 5s
      timeout: 5s
      retries: 20

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: fiber_microservice
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
      POSTGRES_SCHEMA: public
      SERVER_HTTP_PORT: "7704"
    ports:
      - "7704:7704"

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: fiber_microservice
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
      POSTGRES_SCHEMA: public
      SERVER_HTTP_PORT: "7705"
    ports:
      - "7705:7705"

  kong:
    image: kong:3.8
    container_name: micro-kong
    depends_on:
      - auth-service
      - user-service
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_LOG_LEVEL: info
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml:/usr/local/kong/declarative/kong.yml:ro

volumes:
  postgres-data:
